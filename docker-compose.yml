services:
  redis:
    image: redis:7-alpine
    container_name: kvcache-redis
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kvcache-api
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KVCACHE_MODEL=sshleifer/tiny-gpt2
      - MAX_NEW_TOKENS=64
    ports:
      - "18000:18000"
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kvcache-worker
    command: ["python", "-m", "app.worker"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KVCACHE_MODEL=sshleifer/tiny-gpt2
      - MAX_NEW_TOKENS=64
    depends_on:
      - redis
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: kvcache-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/compose/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: kvcache-grafana
    ports:
      - "3001:3000"
    volumes:
      - ./deploy/compose/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/compose/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped
