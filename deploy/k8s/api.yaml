apiVersion: apps/v1
kind: Deployment
metadata:
  name: kvcache-api
  namespace: kvcache-serve
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kvcache-api
  template:
    metadata:
      labels:
        app: kvcache-api
    spec:
      containers:
        - name: api
          image: kvcache-serve-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18000
          env:
            - name: REDIS_HOST
              value: kvcache-redis
            - name: REDIS_PORT
              value: "6379"
            - name: KVCACHE_MODEL
              value: sshleifer/tiny-gpt2
            - name: MAX_NEW_TOKENS
              value: "64"
---
apiVersion: v1
kind: Service
metadata:
  name: kvcache-api
  namespace: kvcache-serve
spec:
  selector:
    app: kvcache-api
  ports:
    - name: http
      port: 18000
      targetPort: 18000
  type: ClusterIP
