apiVersion: apps/v1
kind: Deployment
metadata:
  name: kvcache-reaper
  namespace: kvcache-serve
  labels:
    app: kvcache-reaper
spec:
  replicas: 1

  selector:
    matchLabels:
      app: kvcache-reaper

  template:
    metadata:
      labels:
        app: kvcache-reaper

    spec:
      terminationGracePeriodSeconds: 10

      containers:
        - name: reaper
          image: kvcache-serve:local
          imagePullPolicy: Never

          command:
            - python
            - -m
            - app.reaper

          envFrom:
            - configMapRef:
                name: kvcache-config

          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
