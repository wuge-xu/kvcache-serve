apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kvcache-redis-data
  namespace: kvcache-serve
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kvcache-redis
  namespace: kvcache-serve
  labels:
    app: kvcache-redis
spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: kvcache-redis

  template:
    metadata:
      labels:
        app: kvcache-redis

    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent

          command:
            - redis-server

          args:
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --dir
            - /data

          ports:
            - name: redis
              containerPort: 6379

          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6

          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

          volumeMounts:
            - name: redis-data
              mountPath: /data

      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: kvcache-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: kvcache-redis
  namespace: kvcache-serve
  labels:
    app: kvcache-redis
spec:
  selector:
    app: kvcache-redis

  ports:
    - name: redis
      port: 6379
      targetPort: redis

  type: ClusterIP
